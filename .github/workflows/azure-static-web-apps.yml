name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'Portal-Integral/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Portal-Integral/package-lock.json

      - name: Install dependencies
        working-directory: Portal-Integral
        run: npm ci

      - name: Build (production)
        working-directory: Portal-Integral
        # Usa el environment.prod.ts (configuration: production)
        run: npm run build -- --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'Portal-Integral'
          output_location: 'dist/portal-integral/browser'   # Ajusta seg�n tu angular.json
          skip_app_build: true        # Ya construimos arriba con configuration prod
