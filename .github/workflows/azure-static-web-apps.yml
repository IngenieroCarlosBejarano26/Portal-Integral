name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        # Usa environment.prod.ts (configuration: production)
        run: npm run build -- --configuration production

      # Usamos shibayan/swa-deploy en lugar de Azure/static-web-apps-deploy@v1
      # porque la action oficial es un Docker action que descarga
      # mcr.microsoft.com/appsvc/staticappsclient:stable y MCR ha venido
      # devolviendo 403 Forbidden de forma intermitente. Esta alternativa usa
      # el binario StaticSitesClient directamente (mismo que internamente usa
      # la SWA CLI), sin pasar por Docker ni MCR. Cachea el binario entre runs.
      - name: Deploy to Azure Static Web Apps
        uses: shibayan/swa-deploy@v1
        with:
          deployment-token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app-location: 'dist/portal-integral/browser'

