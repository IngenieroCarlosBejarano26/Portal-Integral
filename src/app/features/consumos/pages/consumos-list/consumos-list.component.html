<div class="page-container">
  <div class="page-header">
    <div class="page-header-content">
      <h1>Historial de Consumos</h1>
      <p class="subtitle">Registro cronológico de almuerzos consumidos. Para registrar un nuevo consumo, ve al módulo de Valeras.</p>
    </div>
    <div class="page-header-actions">
      <button nz-button (click)="onReload()">
        <i nz-icon nzType="reload" nzTheme="outline"></i>
        Actualizar
      </button>
    </div>
  </div>

  <div class="toolbar-card">
    <div class="toolbar-search">
      <nz-input-group [nzPrefix]="searchIcon">
        <input
          nz-input
          placeholder="Buscar por cliente, documento, código QR u observaciones..."
          [(ngModel)]="searchValue"
          (input)="onSearch($any($event.target).value)" />
      </nz-input-group>
      <ng-template #searchIcon>
        <i nz-icon nzType="search" nzTheme="outline"></i>
      </ng-template>
    </div>
    <span class="toolbar-meta">{{ filteredConsumos.length }} consumo(s)</span>
  </div>

  <div class="cards-wrapper">
    <app-card-grid
      [items]="filteredConsumos"
      [config]="cardConfig"
      [actions]="[]"
      [loading]="loading"
      emptyText="No hay consumos registrados">
    </app-card-grid>
  </div>
</div>
