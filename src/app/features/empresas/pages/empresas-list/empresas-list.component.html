<div class="page-container">
  <div class="page-header">
    <div class="page-header-content">
      <h1>Empresas</h1>
      <p class="subtitle">Administra todas tus empresas</p>
    </div>
    <div class="page-header-actions">
      <button nz-button (click)="onReload()">
        <i nz-icon nzType="reload" nzTheme="outline"></i>
        Actualizar
      </button>
      <button nz-button nzType="primary" (click)="openForm()" *appHasPermission="'empresas:create'">
        <i nz-icon nzType="plus" nzTheme="outline"></i>
        Nueva Empresa
      </button>
    </div>
  </div>

  <div class="toolbar-card">
    <div class="toolbar-search">
      <nz-input-group [nzPrefix]="searchIcon">
        <input
          nz-input
          placeholder="Buscar empresa..."
          [(ngModel)]="searchValue"
          (input)="onSearch($any($event.target).value)"
        />
      </nz-input-group>
      <ng-template #searchIcon>
        <i nz-icon nzType="search" nzTheme="outline"></i>
      </ng-template>
    </div>
    <span class="toolbar-meta">{{ filteredEmpresas.length }} empresa(s)</span>
  </div>

  <div class="cards-wrapper">
    <app-card-grid
      [items]="filteredEmpresas"
      [config]="cardConfig"
      [actions]="cardActions"
      [loading]="loading"
      emptyText="No hay empresas registradas"
    >
    </app-card-grid>
  </div>
</div>
