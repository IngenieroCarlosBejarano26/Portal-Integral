<div class="page-container">
  <div class="page-header">
    <div class="page-header-content">
      <h1>Usuarios</h1>
      <p class="subtitle">Gestiona los usuarios del tenant actual</p>
    </div>
    <div class="page-header-actions">
      <button nz-button (click)="onReload()">
        <i nz-icon nzType="reload" nzTheme="outline"></i>
        Actualizar
      </button>
      <button
        nz-button
        nzType="primary"
        nz-tooltip
        [nzTooltipTitle]="planVencido ? 'Tu plan esta vencido. Renueva o cambia de plan para crear mas usuarios.' : ''"
        [disabled]="planVencido"
        (click)="openForm()"
        *appHasPermission="'usuarios:create'">
        <i nz-icon nzType="plus" nzTheme="outline"></i>
        Nuevo Usuario
      </button>
    </div>
  </div>

  <div class="toolbar-card">
    <div class="toolbar-search">
      <nz-input-group [nzPrefix]="searchIcon">
        <input
          nz-input
          placeholder="Buscar por nombre, email o rol..."
          [(ngModel)]="searchValue"
          (input)="onSearch($any($event.target).value)" />
      </nz-input-group>
      <ng-template #searchIcon>
        <i nz-icon nzType="search" nzTheme="outline"></i>
      </ng-template>
    </div>
    <span class="toolbar-meta">{{ filteredUsuarios.length }} usuario(s)</span>
  </div>

  <div class="cards-wrapper">
    <app-card-grid
      [items]="filteredUsuarios"
      [config]="cardConfig"
      [actions]="cardActions"
      [loading]="loading"
      emptyText="No hay usuarios registrados">
    </app-card-grid>
  </div>
</div>
