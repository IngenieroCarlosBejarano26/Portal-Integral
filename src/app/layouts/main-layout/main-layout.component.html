<nz-layout class="main-layout" [class.is-collapsed]="isCollapsed">
  <!-- Sidebar -->
  <nz-sider
    class="sidebar"
    [nzCollapsible]="true"
    [nzCollapsed]="isCollapsed"
    [nzWidth]="240"
    [nzCollapsedWidth]="72"
    [nzTrigger]="null">

    <!-- Brand -->
    <div class="brand" [class.brand--collapsed]="isCollapsed">
      <div class="brand-logo">
        <div class="brand-logo-shape">
          <span class="brand-logo-letter">{{ organizationName.charAt(0) }}</span>
          <span class="brand-logo-glow"></span>
        </div>
      </div>
      <div class="brand-text" *ngIf="!isCollapsed">
        <span class="brand-label">
          <i nz-icon nzType="bank" nzTheme="outline"></i>
          Organización
        </span>
        <h2 class="brand-name">{{ organizationName }}</h2>
        <span class="brand-status">
          <span class="brand-status-dot"></span>
          Sistema activo
        </span>
      </div>
    </div>

    <!-- User Info — click abre dropdown con perfil y cerrar sesión -->
    <div
      class="user-info"
      *ngIf="currentUser"
      [class.user-info--collapsed]="isCollapsed"
      nz-dropdown
      nzTrigger="click"
      [nzDropdownMenu]="userMenu"
      nzPlacement="bottomLeft">
      <div class="user-avatar">
        <span class="user-avatar-letter">{{ getUserInitial() }}</span>
        <span class="user-status-pill"></span>
      </div>
      <div class="user-details" *ngIf="!isCollapsed">
        <p class="user-name">{{ currentUser.nombreUsuario }}</p>
        <p class="user-role">
          <i nz-icon nzType="safety" nzTheme="outline"></i>
          {{ currentUser.rol }}
        </p>
      </div>
      <i
        *ngIf="!isCollapsed"
        nz-icon
        nzType="down"
        nzTheme="outline"
        class="user-caret"></i>
    </div>

    <!-- Dropdown del usuario -->
    <nz-dropdown-menu #userMenu="nzDropdownMenu">
      <ul nz-menu class="user-dropdown-menu">
        <li nz-menu-item (click)="navigateTo('/perfil')">
          <i nz-icon nzType="user" nzTheme="outline"></i>
          <span> Mi perfil</span>
        </li>
        <li nz-menu-divider></li>
        <li nz-menu-item class="logout-item" (click)="logout()">
          <i nz-icon nzType="poweroff" nzTheme="outline"></i>
          <span> Cerrar sesión</span>
        </li>
      </ul>
    </nz-dropdown-menu>

    <!-- Menu -->
    <div class="menu-section" *ngIf="!isCollapsed">
      <span class="menu-section-label">Navegación</span>
    </div>

    <ul nz-menu class="menu" nzTheme="light" nzMode="inline" [nzInlineCollapsed]="isCollapsed">
      <li
        *ngFor="let item of menuItems"
        nz-menu-item
        [nzSelected]="isActive(item.path)"
        [nzMatchRouter]="false"
        (click)="item.path && navigateTo(item.path)">
        <i nz-icon [nzType]="item.icon" nzTheme="outline"></i>
        <span>{{ item.label }}</span>
      </li>
    </ul>

    <!-- Footer Sidebar -->
    <div class="sidebar-footer">
      <div class="footer-divider"></div>
      <div class="app-version" *ngIf="!isCollapsed">
        <span>Portal Valeras</span>
        <span class="app-version-tag">v1.0</span>
      </div>
    </div>
  </nz-sider>

  <!-- Toggle Button (flotante - fuera del sider para evitar recorte) -->
  <button
    type="button"
    class="sidebar-trigger"
    [class.collapsed]="isCollapsed"
    (click)="toggleSidebar()"
    [attr.aria-label]="isCollapsed ? 'Expandir menú' : 'Colapsar menú'">
    <i nz-icon [nzType]="isCollapsed ? 'right' : 'left'" nzTheme="outline"></i>
  </button>

  <!-- Content -->
  <nz-layout class="content-layout" [class.collapsed]="isCollapsed">
    <!-- Banner sticky de vencimiento de plan (solo EnGracia/Vencido). -->
    <div
      *ngIf="mostrarBannerVencimiento"
      class="plan-banner"
      [class.plan-banner--danger]="colorBannerVencimiento === 'danger'"
      [class.plan-banner--warning]="colorBannerVencimiento === 'warning'"
      role="alert">
      <i nz-icon nzType="warning" nzTheme="fill" class="plan-banner-icon"></i>
      <span class="plan-banner-text">{{ textoBannerVencimiento }}</span>
      <button
        nz-button
        nzType="primary"
        nzSize="small"
        class="plan-banner-cta"
        (click)="goToPlanes()">
        <i nz-icon nzType="rocket" nzTheme="outline"></i>
        Ir a planes
      </button>
    </div>

    <nz-content class="content">
      <div class="content-inner">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
